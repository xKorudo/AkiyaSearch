<body>
<header>
  <a class="logo" href="./">🏚 <span>Akiya</span> Search</a>
  <span class="badge-admin">STATS</span>
  <a class="back" href="./admin.html">Admin →</a>
</header>

<div id="gate" class="gate">Checking access…</div>
<div id="wrap" class="wrap" style="display:none">
  <div class="range">
    <button data-d="7" onclick="setRange(7,this)" class="on">Last 7 days</button>
    <button data-d="30" onclick="setRange(30,this)">30 days</button>
    <button data-d="90" onclick="setRange(90,this)">90 days</button>
  </div>
  <div id="content"><div class="muted">Loading…</div></div>
</div>

<script src="js/shared.js"></script>
<script>
let RANGE = 7, EVENTS = [];

window.addEventListener('DOMContentLoaded', async () => {
  await initAuth(); await checkAdmin();
  if (!isAdminUser) {
    document.getElementById('gate').innerHTML = currentUser
      ? 'Signed in but not an admin.'
      : 'Please <a class="lnk" style="color:var(--accent)" href="./search.html">sign in</a> with an admin account.';
    return;
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('wrap').style.display = '';
  loadStats();
});

function setRange(d, btn){ RANGE=d; document.querySelectorAll('.range button').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); loadStats(); }

async function loadStats(){
  const box = document.getElementById('content');
  box.innerHTML = '<div class="muted">Loading…</div>';
  const since = new Date(Date.now()-RANGE*864e5).toISOString();
  const { data, error } = await supa.from('events').select('session_id,name,page,ref,created_at')
    .gte('created_at', since).order('created_at',{ascending:true}).limit(50000);
  if (error){ box.innerHTML = `<div class="muted">Could not load events: ${error.message}<br>(Did you run sql/events.sql?)</div>`; return; }
  EVENTS = data || [];
  render();
}

function render(){
  const box = document.getElementById('content');
  if (!EVENTS.length){ box.innerHTML = '<div class="muted">No events yet in this range.</div>'; return; }
  const sessions = {};
  EVENTS.forEach(e => { (sessions[e.session_id] ||= []).push(e); });
  const sessIds = Object.keys(sessions);

  const pv = EVENTS.filter(e=>e.name==='page_view');
  const opens = EVENTS.filter(e=>e.name==='listing_open').length;
  const clicks = EVENTS.filter(e=>e.name==='source_click').length;

  // page views by page
  const byPage = {}; pv.forEach(e=>{ byPage[e.page]=(byPage[e.page]||0)+1; });
  // referrers
  const byRef = {}; pv.forEach(e=>{ const r=e.ref||'direct'; byRef[r]=(byRef[r]||0)+1; });
  // exit pages: last event page per session
  const exits = {}; sessIds.forEach(s=>{ const ev=sessions[s]; const last=ev[ev.length-1]; exits[last.page]=(exits[last.page]||0)+1; });

  // funnel by session
  const reached = { visit:0, search:0, listing:0, source:0 };
  sessIds.forEach(s=>{
    const ev=sessions[s];
    reached.visit++;
    if (ev.some(e=>e.page==='search'||e.name==='search')) reached.search++;
    if (ev.some(e=>e.name==='listing_open'||e.page==='listing')) reached.listing++;
    if (ev.some(e=>e.name==='source_click')) reached.source++;
  });

  const bar = (obj) => { const max=Math.max(1,...Object.values(obj)); return Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><span class="lbl">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div><span class="val">${v.toLocaleString()}</span></div>`).join(''); };

  const funnelSteps = [['Visited',reached.visit],['Opened Search',reached.search],['Opened a listing',reached.listing],['Clicked Source',reached.source]];
  let funnelHTML=''; const top=reached.visit||1;
  funnelSteps.forEach((s,i)=>{
    const pct=Math.round(s[1]/top*100);
    funnelHTML+=`<div class="funnel-step"><span class="lbl">${s[0]}</span><div class="funnel-bar"><div class="funnel-fill" style="width:${Math.max(pct,6)}%">${s[1].toLocaleString()} · ${pct}%</div></div></div>`;
    if(i<funnelSteps.length-1){ const drop=s[1]?Math.round((1-funnelSteps[i+1][1]/s[1])*100):0; funnelHTML+=`<div class="drop">↓ ${drop}% drop-off</div>`; }
  });

  box.innerHTML = `
    <div class="cards">
      <div class="kpi"><div class="kpi-num">${pv.length.toLocaleString()}</div><div class="kpi-label">Page views</div></div>
      <div class="kpi"><div class="kpi-num">${sessIds.length.toLocaleString()}</div><div class="kpi-label">Sessions</div></div>
      <div class="kpi"><div class="kpi-num">${opens.toLocaleString()}</div><div class="kpi-label">Listing opens</div></div>
      <div class="kpi"><div class="kpi-num">${clicks.toLocaleString()}</div><div class="kpi-label">Source clicks</div></div>
    </div>

    <h2>🪜 Funnel (by session)</h2>
    ${funnelHTML}

    <h2>🚪 Where sessions ended (exit page)</h2>
    ${bar(exits)}

    <h2>📄 Page views by page</h2>
    ${bar(byPage)}

    <h2>🔗 Top referrers</h2>
    ${bar(byRef)}
  `;
}
</script>
</body>
</html>
