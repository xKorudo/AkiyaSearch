name: Scrape & Deploy 2

# Second scrape instance — offset 2h from the primary so fresh listings are
# collected twice as often. Runs at :40 on the alternate even hours (no collisions).

on:
  schedule:
    - cron: "40 2-22/4 * * *"   # 02:40,06:40,10:40,14:40,18:40,22:40
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: akiya-pipeline
  cancel-in-progress: false

jobs:
  scrape-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # stay under GitHub's hard 6h cancel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore listings DB
        uses: actions/cache@v4
        with:
          path: |
            akiya_v4.db
            geocache.json
          key: akiya-db-${{ github.run_id }}
          restore-keys: |
            akiya-db-

      - name: Scrape listings (deep mode — works backward from last SUUMO page)
        run: python run_pipeline.py
        env:
          SCRAPE_MODE: deep
          DEEP_PAGES_PER_RUN: "3"        # 3 SUUMO pages/prefecture per run, backward + 1 overlap
          SCRAPE_TIME_BUDGET: "16200"   # 4.5h scrape cap → leaves time for build+deploy
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Build static snapshot
        run: python export_static.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=akiya-finder --branch main
