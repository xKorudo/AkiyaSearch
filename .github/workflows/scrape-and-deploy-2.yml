name: Scrape & Deploy 2

# Second scrape instance — offset by 2 hours from the primary workflow
# (0 */4 * * *) so fresh listings are collected twice as often.

on:
  schedule:
    - cron: "0 2-22/4 * * *"   # every 4 hours at 02,06,10,14,18,22
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: akiya-pipeline
  cancel-in-progress: false

jobs:
  scrape-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore listings DB
        uses: actions/cache@v4
        with:
          path: |
            akiya_v4.db
            geocache.json
          key: akiya-db-${{ github.run_id }}
          restore-keys: |
            akiya-db-

      - name: Scrape listings
        run: python run_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Build static snapshot
        run: python export_static.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=akiya-finder --branch main
