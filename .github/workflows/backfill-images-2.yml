name: Backfill Images 2 & Deploy

# Second image-gallery backfill shard. Runs offset by 30 minutes from
# backfill-images.yml so both get fresh IPs at different times and together
# cover the full listing backlog (shard 0 vs shard 1).

on:
  schedule:
    - cron: "30 */2 * * *"     # every 2 hours at :30 — offset from shard 0 at :00
  workflow_dispatch: {}

permissions:
  contents: read

# Shared group with scrape-and-deploy.yml so the two never run at the same time
# (they share the same cached DB).
concurrency:
  group: akiya-pipeline
  cancel-in-progress: false

jobs:
  backfill-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Restore listings DB
        uses: actions/cache@v4
        with:
          path: |
            akiya_v4.db
            geocache.json
          key: akiya-db-${{ github.run_id }}
          restore-keys: |
            akiya-db-

      - name: Backfill detail-page galleries (fresh IP, shard 1)
        run: python enrich_images.py 300 --shard 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Build static snapshot
        run: python export_static.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=akiya-finder --branch main
