name: Backfill Images 2 & Deploy

# Second parallel image backfill — shard 1 of 2. Runs on ODD hours at :00 so it
# never shares a start time with any other workflow (shard-0 runs EVEN hours).

on:
  schedule:
    - cron: "0 1-23/2 * * *"   # odd hours at :00 (01,03,…23)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: akiya-backfill
  cancel-in-progress: false

jobs:
  backfill-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Restore listings DB
        uses: actions/cache@v4
        with:
          path: |
            akiya_v4.db
            geocache.json
          key: akiya-db-${{ github.run_id }}
          restore-keys: |
            akiya-db-

      - name: Backfill detail-page galleries (fresh IP, full budget)
        run: python enrich_images.py 300 --shard 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Build static snapshot
        run: python export_static.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=akiya-finder --branch main
