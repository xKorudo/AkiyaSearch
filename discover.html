.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 10px 18px; font-size: 12px; font-family: var(--mono); color: var(--text2); z-index: 9999; transition: transform .2s; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
.notif-badge { position: absolute; top: -4px; right: -4px; background: var(--red); color: #fff; font-size: 9px; font-weight: 700; min-width: 15px; height: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
.notif-panel { position: fixed; top: 50px; right: 12px; width: 340px; max-height: 70vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,.6); z-index: 9500; display: none; }
.notif-panel.open { display: block; }
.notif-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; }
.notif-head span { font-size: 10px; font-weight: 600; color: var(--blue); cursor: pointer; }
.notif-empty { padding: 24px 14px; text-align: center; color: var(--text3); font-size: 12px; }

@media (max-width: 860px) {
  /* Same hamburger-dropdown nav as the other pages */
  header { padding: 0 12px; gap: 10px; }
  .logo-jp { display: none; }
  .nav-toggle { display: block; }
  .main-nav { position: absolute; top: 52px; left: 0; right: 0; flex-direction: column; gap: 0; margin: 0; background: var(--surface); border-bottom: 1px solid var(--border2); padding: 6px; z-index: 200; transform: translateY(-150%); transition: transform .2s; pointer-events: none; }
  .main-nav.open { transform: translateY(0); pointer-events: all; }
  .nav-link { width: 100%; padding: 12px 14px; font-size: 14px; }
  .notif-panel { width: calc(100% - 24px); left: 12px; }
  .detail-panel { width: 100vw; max-height: 95vh; height: 95vh; border-radius: 12px 12px 0 0; border: none; top: auto; bottom: 0; left: 0; transform: translateY(4%); }
  .detail-panel.open { transform: translateY(0); }

  /* Compact discover card so price + specs read immediately */
  .discover-view { padding: 12px 12px 28px; }
  .disco-thumbs { display: none; }   /* hide thumbnails on phones to save space */
  .disco-img, .disco-ph { height: 200px; }
  .disco-body { padding: 12px 14px; }
  .disco-title { font-size: 16px; }
  .disco-price { font-size: 19px; margin-bottom: 8px; }
  .disco-specs { grid-template-columns: 1fr 1fr; }
  .disco-actions { gap: 24px; }
  .disco-btn { width: 58px; height: 58px; font-size: 24px; }
  .disco-hint { display: none; }
}
</style>
</head>
<body>

  <a class="logo" href="./index.html">🏚 <span>Akiya</span> Search <span class="logo-jp">空き家</span></a>
  <nav class="main-nav" id="main-nav">
    <a class="nav-link" href="./index.html">🏠 Home</a>
    <a class="nav-link" href="./search.html">🔍 Search</a>
    <a class="nav-link" href="./search.html#saved">♡ Saved <span id="fav-count" class="nav-badge">0</span></a>

</div>

<!-- SHARED OVERLAYS -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-head">Notifications <span id="notif-clear" onclick="markNotifsSeen()">Mark all read</span></div>
  <div id="notif-list"></div>

<div class="lightbox" id="lightbox" onclick="lbClickBg(event)">

  <span class="lightbox-next" onclick="lbNav(1)">›</span>

</div>
<div class="auth-overlay" id="auth-overlay" onclick="authClickBg(event)">
  <div class="auth-modal">
    <div class="auth-close" onclick="closeAuth()">✕</div>
    <div class="auth-title" id="auth-title">Sign in</div>
    <div class="auth-sub">Save favorites and sync them across your devices.</div>
    <button class="auth-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="auth-or"><span>or use email</span></div>
    <input class="auth-input" type="email" id="auth-email" placeholder="Email">
    <input class="auth-input" type="password" id="auth-password" placeholder="Password">
    <button class="auth-submit" id="auth-submit" onclick="submitAuth()">Sign in</button>
    <div class="auth-switch"><span id="auth-switch-text">No account?</span> <a id="auth-switch-link" onclick="toggleAuthMode()">Create one</a></div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="js/shared.js"></script>
<script>
// ── DISCOVER PAGE SPECIFIC ────────────────────────────────────────────────────
let discoQueue = [], discoCurrent = null;
const activeView = 'discover';

function onDataLoaded() {
  FILTERED = ALL.slice();
  renderDiscover();
}

function buildDiscoQueue() {
  const liked = Object.keys(SWIPES).filter(id => SWIPES[id]);
  const disliked = Object.keys(SWIPES).filter(id => !SWIPES[id]);
  const seen = new Set(Object.keys(SWIPES));
  let cand = FILTERED.filter(l => !seen.has(l.id) && l.image_url);
  const likeP = profileVec(liked), dislikeP = profileVec(disliked);
  if (!likeP) {
    cand = cand.sort(() => Math.random() - 0.5);
  } else {
    cand.forEach(l => { const f = featurize(l); l._score = cosineSim(f, likeP) - (dislikeP ? 0.4*cosineSim(f, dislikeP) : 0); });
    cand.sort((a, b) => b._score - a._score);
  }
  discoQueue = cand.slice(0, 80);
}

function discoReason(l) {
  const liked = Object.keys(SWIPES).filter(id => SWIPES[id]);
  if (!liked.length) return 'Like a few to start tuning your recommendations →';
  const p = profileVec(liked), f = featurize(l);
  const tagFeats = { kominka:'traditional kominka', sea:'coastal', onsen:'hot-spring area', renovated:'renovated', farm:'land/farm', mountain:'mountains', free:'free/cheap', newish:'newer build' };
  const hits = Object.keys(tagFeats).filter(k => f[k] && p[k] > 0.35).map(k => tagFeats[k]);
  return hits.length ? 'Matches your taste: ' + hits.slice(0,3).join(', ') : 'Similar to houses you liked';
}

function discoRichCard(l) {
  const s = seismicInfo(l.built_year), rk = riskLevel(l), ab = calcAirbnb(l);
  const imgs = (l.images && l.images.length) ? l.images : (l.image_url ? [l.image_url] : []);
  const thumbs = imgs.length > 1
    ? `<div class="disco-thumbs">${imgs.slice(1,6).map((u,i)=>`<img src="${u}" onclick="openDetailLightbox(${i+1})" onerror="this.remove()">`).join('')}</div>` : '';
  const specs = [['Floor',l.size_m2?l.size_m2+'m²':'—'],['Land',l.land_m2?l.land_m2+'m²':'—'],['Layout',l.rooms||'—'],
                 ['Built',l.built_year?l.built_year:'—'],['Condition',conditionEN(l.condition)||'—'],['Region',prefToEN(l.prefecture)]]
    .map(([a,b])=>`<div class="disco-spec"><span>${a}</span><b>${b}</b></div>`).join('');
  const desc = (l.description_en || l.description || '').slice(0, 200);
  const priceStr = l.price_jpy === 0 ? 'FREE / 無償' : l.price_jpy ? fmtYen(l.price_jpy) + (userCurrency!=='JPY' ? ` · ${convPrice(l.price_jpy)}` : '') : 'Price on request';
  _detailImgs = imgs;
  return `<div class="disco-card">
    ${imgs.length ? `<img class="disco-img" src="${bigImg(imgs[0])}" onclick="openDetailLightbox(0)" onerror="this.style.display='none'">` : `<div class="disco-ph">家</div>`}
    ${thumbs}
    <div class="disco-body">
      <div class="disco-loc">${prefToEN(l.prefecture)}${l.city?' · '+l.city:''} · ${l.source||''}</div>
      <div class="disco-title">${l.title_en||l.title}</div>
      ${l.title_en ? `<div style="font-family:var(--jp);font-size:12px;color:var(--text3);margin-bottom:8px">${l.title}</div>` : ''}
      <div class="disco-price">${priceStr}</div>
      <a style="display:inline-flex;gap:5px;font-size:12px;color:var(--blue);text-decoration:none;margin-bottom:10px" href="${gmapsUrl(l)}" target="_blank">📍 Open in Google Maps</a>
      <div class="disco-specs">${specs}</div>
      <div class="disco-pills">
        <span class="spec-pill" style="border-color:${s.color};color:${s.color}">🛡 ${s.label}</span>
        <span class="spec-pill" style="border-color:${rk.color};color:${rk.color}">${rk.label}</span>
        <span class="spec-pill">Airbnb ${ab}/99</span>
      </div>
      ${desc ? `<div class="disco-desc">${desc}${desc.length>=200?'…':''}</div>` : ''}
      <div class="disco-why">✨ ${discoReason(l)}</div>
      <a class="disco-open" href="listing.html?id=${encodeURIComponent(l.id)}" target="_blank">Open full page ↗</a>
    </div>
  </div>`;
}

function attachDiscoSwipe() {
  const card = document.querySelector('.disco-card');
  if (!card) return;
  let startX = 0, startY = 0, dragging = false;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    dragging = false; card.style.transition = 'none';
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!dragging && Math.abs(dx) < Math.abs(dy)) return;
    dragging = true;
    card.style.transform = `translateX(${dx}px) rotate(${dx * 0.04}deg)`;
    card.style.opacity = String(1 - Math.abs(dx) / 280);
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (!dragging) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 70) {
      const dir = dx > 0 ? 1 : -1;
      card.style.transition = 'transform 0.3s, opacity 0.3s';
      card.style.transform = `translateX(${dir * 120}%) rotate(${dir * 18}deg)`;
      card.style.opacity = '0';
      setTimeout(() => swipe(dx > 0), 280);
    } else {
      card.style.transition = 'transform 0.25s, opacity 0.25s';
      card.style.transform = ''; card.style.opacity = '';
    }
  }, { passive: true });
}

function renderDiscover() {
  const el = document.getElementById('discover-view');
  if (!discoQueue.length) buildDiscoQueue();
  discoCurrent = discoQueue.shift();
  if (!discoCurrent) {
    el.innerHTML = `<div class="watch-empty">No more matches right now. Try clearing filters, or come back as new houses arrive.</div>`;
    return;
  }
  const l = discoCurrent;
  const total = Object.keys(SWIPES).length;
  el.innerHTML = `<div class="disco-progress" style="margin-bottom:12px">${total ? total + ' rated · 👍 likes are saved to your Favorites' : 'Swipe to teach it your taste · 👍 likes go to your Favorites'}</div>`
    + discoRichCard(l) + `
    <div class="disco-actions">
      <button class="disco-btn dislike" onclick="swipe(false)" title="Not for me (←)">👎</button>
      <button class="disco-btn like" onclick="swipe(true)" title="Like it (→)">👍</button>
    </div>
    <div class="disco-hint">swipe the card · or ← dislike / → like · tap photos to zoom</div>`;
  attachDiscoSwipe();
}

function swipe(liked) {
  if (!discoCurrent) return;
  const id = discoCurrent.id;
  SWIPES[id] = liked;
  saveSwipe(id, liked);
  // A 👍 also saves to Favorites (so all your likes live in one place: Saved)
  if (liked) {
    (async () => {
      const u = (typeof ensureUser === 'function') ? await ensureUser() : currentUser;
      if (u && !FAVS.has(id)) {
        FAVS.add(id); if (typeof updateFavCount === 'function') updateFavCount();
        if (supa) supa.from('favorites').upsert({ user_id: u.id, listing_id: id }, { onConflict: 'user_id,listing_id', ignoreDuplicates: true });
      }
    })();
  }
  if (Object.keys(SWIPES).length % 4 === 0) discoQueue = [];
  renderDiscover();
  const v = document.getElementById('discover-view'); if (v) v.scrollTop = 0;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') swipe(true);
  if (e.key === 'ArrowLeft') swipe(false);
});

window.addEventListener('DOMContentLoaded', () => {
  loadListings();
  fetchFXRates();
  initAuth();
});
</script>
