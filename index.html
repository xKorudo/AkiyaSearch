<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #1e1e1e;
  --surface3: #252525;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e8e4;
  --text2: #9a9a90;
  --text3: #585850;
  --accent: #e8a020;
  --accent2: #f0c060;
  --green: #3ecf8e;
  --red: #f05050;
  --blue: #5090f0;
  --purple: #a060f0;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Syne', sans-serif;
  --jp: 'Noto Serif JP', serif;
  --r: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
header { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 100; }
.logo { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.logo span { color: var(--accent); }
.logo-jp { font-family: var(--jp); font-weight: 300; font-size: 13px; color: var(--text3); }
.header-divider { width: 1px; height: 24px; background: var(--border2); }
.live-badge { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--green); font-family: var(--mono); letter-spacing: 0.08em; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.hbtn { padding: 6px 12px; border-radius: var(--r); font-family: var(--sans); font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); transition: all .15s; }
.hbtn:hover { background: var(--surface3); color: var(--text); }
.hbtn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.hbtn-refresh { background: none; border-color: var(--accent); color: var(--accent); }
.hbtn-refresh:hover { background: var(--accent); color: #000; }
#result-count { font-family: var(--mono); font-size: 11px; color: var(--text3); }

/* TOOLBAR */
.toolbar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0; }
.search-wrap { position: relative; flex: 1; max-width: 320px; }
.search-wrap input { width: 100%; height: 32px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 0 10px 0 30px; font-family: var(--sans); font-size: 12px; color: var(--text); outline: none; }
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; opacity: .4; }
select { height: 32px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 0 8px; font-family: var(--sans); font-size: 11px; color: var(--text2); outline: none; cursor: pointer; }
select:focus { border-color: var(--accent); }
.toolbar-sep { width: 1px; height: 20px; background: var(--border2); }
.filter-tags { display: flex; gap: 6px; }
.ftag { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); background: none; font-family: var(--sans); font-size: 10px; font-weight: 600; color: var(--text3); cursor: pointer; letter-spacing: 0.04em; transition: all .15s; }
.ftag:hover { border-color: var(--accent); color: var(--accent); }
.ftag.on { background: var(--accent); border-color: var(--accent); color: #000; }

/* MAIN LAYOUT */
.main { flex: 1; display: flex; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 400px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.sidebar-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }
.price-filter { display: flex; align-items: center; gap: 8px; }
.price-filter label { font-size: 10px; color: var(--text3); font-family: var(--mono); }
input[type=range] { width: 90px; accent-color: var(--accent); height: 3px; cursor: pointer; }
.price-val { font-family: var(--mono); font-size: 10px; color: var(--accent); min-width: 60px; }
.listings-list { flex: 1; overflow-y: auto; }
.listings-list::-webkit-scrollbar { width: 4px; }
.listings-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* LISTING CARD */
.lcard { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.lcard:hover { background: var(--surface2); }
.lcard.selected { background: rgba(232,160,32,.07); border-left: 2px solid var(--accent); }
.lcard-img-wrap { position: relative; width: 100%; height: 160px; overflow: hidden; background: var(--surface3); }
.lcard-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
.lcard:hover .lcard-img-wrap img { transform: scale(1.03); }
.lcard-img-placeholder { width: 100%; height: 160px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-family: var(--jp); font-size: 36px; color: var(--border2); }
.lcard-badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; }
.badge { padding: 2px 7px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.badge-free { background: var(--green); color: #000; }
.badge-cheap { background: var(--accent); color: #000; }
.badge-airbnb-hot { background: var(--red); color: #fff; }
.badge-airbnb-ok { background: var(--purple); color: #fff; }
.badge-source { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.7); color: var(--text2); padding: 2px 6px; border-radius: 3px; font-size: 9px; font-family: var(--mono); }
.lcard-body { padding: 12px 14px 10px; }
.lcard-location { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 4px; text-transform: uppercase; }
.lcard-title { font-size: 12px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; color: var(--text); }
.lcard-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.lcard-price-jpy { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--accent2); }
.lcard-price-eur { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.lcard-price-free { font-family: var(--mono); font-size: 14px; color: var(--green); font-weight: 500; }
.lcard-specs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.spec-pill { background: var(--surface3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-family: var(--mono); font-size: 9px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.spec-pill .si { font-size: 10px; }
.airbnb-bar { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
.airbnb-label { font-size: 9px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.06em; white-space: nowrap; }
.airbnb-track { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.airbnb-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.airbnb-score-val { font-family: var(--mono); font-size: 9px; font-weight: 600; min-width: 28px; text-align: right; }
.lcard-footer { display: flex; align-items: center; justify-content: space-between; padding: 6px 14px 10px; }
.lcard-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.ltag { font-size: 9px; color: var(--text3); background: var(--surface3); padding: 2px 6px; border-radius: 3px; }
.lcard-link { font-family: var(--mono); font-size: 9px; color: var(--blue); text-decoration: none; }
.lcard-link:hover { color: var(--accent); }

/* MAP */
.map-area { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* DETAIL PANEL (top-level overlay, slides in from the right) */
.detail-panel { position: fixed; top: 52px; right: 0; width: 440px; height: calc(100vh - 52px); background: var(--surface); border-left: 1px solid var(--border2); z-index: 9000; transform: translateX(100%); transition: transform .25s ease; overflow-y: auto; }
.detail-panel.open { transform: translateX(0); }
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.dp-close { position: sticky; top: 0; z-index: 10; background: var(--surface); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.dp-close-btn { width: 28px; height: 28px; background: var(--surface3); border: 1px solid var(--border2); border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
.dp-close-btn:hover { color: var(--text); background: var(--surface2); }
.dp-img { width: 100%; height: 220px; object-fit: cover; display: block; }
.dp-img-placeholder { width: 100%; height: 220px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-family: var(--jp); font-size: 60px; color: var(--border2); }
.dp-body { padding: 20px; }
.dp-location { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.dp-title { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 16px; }
.dp-price-block { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px; }
.dp-price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
.dp-price-jpy { font-family: var(--mono); font-size: 22px; color: var(--accent2); font-weight: 500; }
.dp-price-eur { font-family: var(--mono); font-size: 14px; color: var(--text3); }
.dp-price-free { font-family: var(--mono); font-size: 20px; color: var(--green); }
.dp-price-note { font-size: 10px; color: var(--text3); margin-top: 2px; }
.dp-specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.dp-spec { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px; }
.dp-spec-label { font-size: 9px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }
.dp-spec-val { font-size: 13px; font-weight: 600; color: var(--text); }
.dp-section-title { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 4px; }
.dp-desc { font-size: 12px; line-height: 1.7; color: var(--text2); margin-bottom: 16px; }

/* AIRBNB ANALYSIS */
.airbnb-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 16px; margin-bottom: 16px; }
.airbnb-score-big { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.airbnb-score-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 2px solid; }
.airbnb-score-num { font-family: var(--mono); font-size: 18px; font-weight: 500; line-height: 1; }
.airbnb-score-label { font-size: 8px; letter-spacing: 0.06em; opacity: .7; }
.airbnb-verdict { flex: 1; }
.airbnb-verdict-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.airbnb-verdict-sub { font-size: 11px; color: var(--text2); line-height: 1.5; }
.airbnb-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.airbnb-metric { display: flex; flex-direction: column; gap: 2px; }
.airbnb-metric-label { font-size: 9px; color: var(--text3); font-family: var(--mono); }
.airbnb-metric-val { font-size: 12px; font-weight: 600; font-family: var(--mono); }
.airbnb-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.airbnb-pros, .airbnb-cons { background: var(--surface3); border-radius: 4px; padding: 10px; }
.airbnb-pros-title { font-size: 9px; font-weight: 700; color: var(--green); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.airbnb-cons-title { font-size: 9px; font-weight: 700; color: var(--red); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.airbnb-point { font-size: 10px; color: var(--text2); line-height: 1.6; display: flex; gap: 4px; }
.airbnb-point::before { content: '·'; color: var(--text3); flex-shrink: 0; }

/* YEN CALCULATOR */
.yen-calc { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 16px; margin-bottom: 16px; }
.yen-calc-title { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.yen-calc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.yen-calc-label { font-size: 10px; color: var(--text2); font-family: var(--mono); width: 90px; flex-shrink: 0; }
.yen-calc-input { flex: 1; height: 30px; background: var(--surface3); border: 1px solid var(--border2); border-radius: 4px; padding: 0 8px; font-family: var(--mono); font-size: 12px; color: var(--text); outline: none; }
.yen-calc-input:focus { border-color: var(--accent); }
.yen-calc-result { background: var(--surface3); border-radius: 4px; padding: 10px 12px; }
.yen-calc-result-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.yen-calc-result-label { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.yen-calc-result-val { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent2); }
.yen-calc-note { font-size: 9px; color: var(--text3); margin-top: 6px; }

/* GLOBAL YEN CALC PANEL */
.yen-panel { position: fixed; bottom: 20px; right: 20px; width: 320px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; z-index: 9000; box-shadow: 0 8px 32px rgba(0,0,0,.5); transform: translateY(20px); opacity: 0; pointer-events: none; transition: all .2s; }
.yen-panel.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.yen-panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.yen-panel-title { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; }
.yen-panel-close { cursor: pointer; color: var(--text3); font-size: 16px; }
.yen-panel-body { padding: 16px; }
.yen-big-input { width: 100%; height: 44px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 0 12px; font-family: var(--mono); font-size: 18px; color: var(--text); outline: none; margin-bottom: 10px; }
.yen-big-input:focus { border-color: var(--accent); }
.yen-results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.yen-result-box { background: var(--surface2); border-radius: 4px; padding: 10px; }
.yen-result-currency { font-size: 9px; color: var(--text3); font-family: var(--mono); margin-bottom: 3px; }
.yen-result-amount { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); }
.yen-rate-note { font-size: 9px; color: var(--text3); font-family: var(--mono); margin-top: 10px; text-align: center; }

/* LEAFLET CUSTOM */
.leaflet-popup-content-wrapper { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
.leaflet-popup-tip { background: var(--surface2); }
.leaflet-popup-content { margin: 0; }
.map-popup { padding: 12px 14px; width: 200px; }
.map-popup-loc { font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.map-popup-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
.map-popup-price { font-family: var(--mono); font-size: 14px; color: var(--accent2); margin-bottom: 4px; }
.map-popup-btn { display: block; margin-top: 8px; padding: 6px 10px; background: var(--accent); color: #000; font-family: var(--sans); font-size: 10px; font-weight: 700; text-align: center; border-radius: 4px; cursor: pointer; }

/* IMAGE GALLERY */
.dp-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 16px; }
.dp-gallery-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 3px; cursor: zoom-in; transition: opacity .15s; display: block; }
.dp-gallery-img:hover { opacity: .85; }
.dp-gallery-main { grid-column: span 3; aspect-ratio: 16/9; border-radius: 4px; }

/* LIGHTBOX */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 99999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .2s; }
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox-img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 4px; box-shadow: 0 8px 48px rgba(0,0,0,.6); }
.lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; opacity: .7; line-height: 1; }
.lightbox-close:hover { opacity: 1; }
.lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); font-size: 36px; color: #fff; cursor: pointer; opacity: .6; padding: 12px; user-select: none; }
.lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }
.lightbox-prev { left: 12px; }
.lightbox-next { right: 12px; }
.lightbox-counter { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,.6); }
.lightbox-thumbs { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; max-width: 90vw; overflow-x: auto; padding: 4px; }
.lightbox-thumb { width: 56px; height: 42px; object-fit: cover; border-radius: 3px; cursor: pointer; opacity: .5; border: 2px solid transparent; flex-shrink: 0; transition: all .15s; }
.lightbox-thumb.active { opacity: 1; border-color: var(--accent); }

/* AUTH MODAL */
.auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 99998; display: none; align-items: center; justify-content: center; }
.auth-overlay.open { display: flex; }
.auth-modal { position: relative; width: 340px; background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 28px 24px 22px; box-shadow: 0 12px 48px rgba(0,0,0,.6); }
.auth-close { position: absolute; top: 14px; right: 16px; cursor: pointer; color: var(--text3); font-size: 16px; }
.auth-close:hover { color: var(--text); }
.auth-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.auth-sub { font-size: 11px; color: var(--text3); margin-bottom: 18px; line-height: 1.5; }
.auth-input { width: 100%; height: 40px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 0 12px; font-family: var(--sans); font-size: 13px; color: var(--text); outline: none; margin-bottom: 10px; }
.auth-input:focus { border-color: var(--accent); }
.auth-submit { width: 100%; height: 42px; background: var(--accent); color: #000; border: none; border-radius: var(--r); font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: .03em; }
.auth-submit:hover { background: var(--accent2); }
.auth-switch { text-align: center; font-size: 11px; color: var(--text3); margin-top: 14px; }
.auth-switch a { color: var(--accent); cursor: pointer; }
.auth-msg { text-align: center; font-size: 11px; margin-top: 10px; min-height: 14px; }
.auth-msg.error { color: var(--red); }
.auth-msg.ok { color: var(--green); }

/* FAVORITE (heart) BUTTON */
.fav-btn { position: absolute; bottom: 8px; right: 8px; width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,.6); border: 1px solid var(--border2); color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; z-index: 3; }
.fav-btn:hover { background: rgba(0,0,0,.85); transform: scale(1.1); }
.fav-btn.on { color: var(--red); border-color: var(--red); }
#fav-nav-btn.on { background: var(--red); border-color: var(--red); color: #fff; }
.dp-fav-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; }
.dp-fav-btn.on { color: var(--red); border-color: var(--red); }

/* EMPTY */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text3); gap: 8px; }
.empty-jp { font-family: var(--jp); font-size: 48px; opacity: .15; }

/* LOADING */
.loading-strip { height: 2px; background: var(--surface3); flex-shrink: 0; display: none; overflow: hidden; }
.loading-strip.on { display: block; }
.loading-strip::after { content: ''; display: block; width: 30%; height: 100%; background: var(--accent); animation: ls 1s ease-in-out infinite; }
@keyframes ls { 0%{margin-left:-30%} 100%{margin-left:100%} }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); padding: 10px 18px; font-size: 12px; font-family: var(--mono); color: var(--text2); z-index: 9999; transition: transform .2s; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── TOP NAV (sections) ──────────────────────────────────────────────────── */
.main-nav { display: flex; gap: 4px; margin-left: 8px; }
.nav-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--r); font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; letter-spacing: .01em; transition: all .15s; white-space: nowrap; }
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: var(--surface3); color: var(--accent); }
.nav-badge { font-family: var(--mono); font-size: 10px; background: var(--surface3); color: var(--text2); border-radius: 10px; padding: 1px 6px; }
.nav-link.active .nav-badge { background: var(--accent); color: #000; }
.nav-toggle { display: none; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 18px; width: 38px; height: 34px; border-radius: var(--r); cursor: pointer; }

/* ── CARD GRID (Search / Saved sections) ─────────────────────────────────── */
.sidebar.grid-mode { width: 100% !important; }
.grid-mode .listings-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; padding: 16px; align-content: start; }
.grid-mode .lcard { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface2); }
.grid-mode .lcard:hover { border-color: var(--border2); }
.grid-mode .lcard.selected { border-left: 2px solid var(--accent); }

/* ── RESPONSIVE / MOBILE ─────────────────────────────────────────────────── */
@media (max-width: 860px) {
  header { padding: 0 12px; gap: 10px; }
  .hide-mobile { display: none !important; }
  .nav-toggle { display: block; }
  .main-nav {
    position: absolute; top: 52px; left: 0; right: 0;
    flex-direction: column; gap: 0; margin: 0;
    background: var(--surface); border-bottom: 1px solid var(--border2);
    padding: 6px; z-index: 200;
    transform: translateY(-150%); transition: transform .2s; pointer-events: none;
  }
  .main-nav.open { transform: translateY(0); pointer-events: all; }
  .nav-link { width: 100%; padding: 12px 14px; font-size: 14px; }

  /* toolbar wraps and scrolls */
  .toolbar { height: auto; flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .search-wrap { max-width: none; flex: 1 1 100%; }
  .filter-tags { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
  .toolbar-sep { display: none; }

  /* layout: one section visible at a time, full width */
  .sidebar { width: 100% !important; border-right: none; }
  .grid-mode .listings-list { grid-template-columns: 1fr; padding: 12px; gap: 12px; }

  /* detail + panels go full-screen on phones */
  .detail-panel { width: 100%; }
  .yen-panel { width: calc(100% - 24px); right: 12px; left: 12px; }
  .auth-modal { width: calc(100% - 32px); }
}
</style>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let ALL = [], FILTERED = [], selectedId = null, activeView = 'split';
let activeTags = new Set();
let map = null, markers = [];
let FX = { EUR: 0.0062, USD: 0.0067, GBP: 0.0053, AUD: 0.0103 }; // fallback rates

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  loadListings();
  fetchFXRates();
  initAuth();
  setSection('search');   // default to the card-grid view
});

// ── AUTH + FAVORITES ──────────────────────────────────────────────────────────
let supa = null, currentUser = null, FAVS = new Set(), favView = false, authMode = 'signin';

async function initAuth() {
  // Load local favorites first so the heart icons are correct even when logged out
  try { FAVS = new Set(JSON.parse(localStorage.getItem('akiya_favs') || '[]')); } catch { FAVS = new Set(); }
  updateFavCount();

  if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
    supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data } = await supa.auth.getSession();
    if (data && data.session) { currentUser = data.session.user; await loadCloudFavs(); }
    supa.auth.onAuthStateChange((_e, session) => {
      currentUser = session ? session.user : null;
      updateAuthUI();
    });
  }
  updateAuthUI();
}

function updateAuthUI() {
  const chip = document.getElementById('user-chip');
  const btn = document.getElementById('login-btn');
  if (currentUser) {
    chip.style.display = 'flex';
    btn.style.display = 'none';
    document.getElementById('user-email').textContent = currentUser.email;
  } else {
    chip.style.display = 'none';
    btn.style.display = '';
  }
}

// --- favorites storage ---
function isFav(id) { return FAVS.has(id); }
function updateFavCount() { document.getElementById('fav-count').textContent = FAVS.size; }
function saveLocalFavs() { localStorage.setItem('akiya_favs', JSON.stringify([...FAVS])); }

async function toggleFav(id, el) {
  const adding = !FAVS.has(id);
  adding ? FAVS.add(id) : FAVS.delete(id);
  saveLocalFavs();
  updateFavCount();

  // update the clicked control's appearance
  if (el) {
    el.classList.toggle('on', adding);
    if (el.classList.contains('dp-fav-btn')) el.textContent = adding ? '♥ Saved' : '♡ Save to favorites';
    else el.textContent = adding ? '♥' : '♡';
  }
  // keep card + detail hearts in sync
  document.querySelectorAll(`.fav-btn[onclick*="'${id}'"]`).forEach(b => { b.classList.toggle('on', adding); b.textContent = adding ? '♥' : '♡'; });

  if (favView) filter();  // if viewing favorites, refresh the list

  // cloud sync if logged in
  if (supa && currentUser) {
    try {
      if (adding) await supa.from('favorites').upsert({ user_id: currentUser.id, listing_id: id });
      else await supa.from('favorites').delete().eq('user_id', currentUser.id).eq('listing_id', id);
    } catch { /* stays in localStorage regardless */ }
  } else if (adding && !currentUser) {
    showToast('Saved on this device · sign in to sync');
  }
}

async function loadCloudFavs() {
  if (!supa || !currentUser) return;
  try {
    const { data } = await supa.from('favorites').select('listing_id').eq('user_id', currentUser.id);
    if (data) {
      data.forEach(r => FAVS.add(r.listing_id));   // merge cloud + local
      // push any local-only favorites up to the cloud
      const rows = [...FAVS].map(id => ({ user_id: currentUser.id, listing_id: id }));
      if (rows.length) await supa.from('favorites').upsert(rows);
      saveLocalFavs(); updateFavCount();
      if (typeof renderList === 'function') renderList();
    }
  } catch { /* ignore */ }
}

function toggleFavView() {
  // Kept for compatibility; the "Saved" nav section now drives this.
  setSection(favView ? 'search' : 'saved');
}

// --- auth modal ---
function openAuth() {
  if (!supa) { showToast('Login not configured yet — add Supabase keys'); return; }
  document.getElementById('auth-overlay').classList.add('open');
  document.getElementById('auth-msg').textContent = '';
}
function closeAuth() { document.getElementById('auth-overlay').classList.remove('open'); }
function authClickBg(e) { if (e.target === document.getElementById('auth-overlay')) closeAuth(); }
function toggleAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  const signin = authMode === 'signin';
  document.getElementById('auth-title').textContent = signin ? 'Sign in' : 'Create account';
  document.getElementById('auth-submit').textContent = signin ? 'Sign in' : 'Create account';
  document.getElementById('auth-switch-text').textContent = signin ? 'No account?' : 'Have an account?';
  document.getElementById('auth-switch-link').textContent = signin ? 'Create one' : 'Sign in';
  document.getElementById('auth-msg').textContent = '';
}
async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw = document.getElementById('auth-password').value;
  const msg = document.getElementById('auth-msg');
  msg.className = 'auth-msg'; msg.textContent = '…';
  if (!email || !pw) { msg.className = 'auth-msg error'; msg.textContent = 'Enter email and password.'; return; }
  try {
    if (authMode === 'signup') {
      const { error } = await supa.auth.signUp({ email, password: pw });
      if (error) throw error;
      msg.className = 'auth-msg ok'; msg.textContent = 'Account created! Check your email to confirm, then sign in.';
    } else {
      const { data, error } = await supa.auth.signInWithPassword({ email, password: pw });
      if (error) throw error;
      currentUser = data.user;
      await loadCloudFavs();
      updateAuthUI();
      closeAuth();
      showToast('Signed in');
    }
  } catch (err) {
    msg.className = 'auth-msg error'; msg.textContent = err.message || 'Authentication failed.';
  }
}
async function signOut() {
  if (supa) await supa.auth.signOut();
  currentUser = null;
  updateAuthUI();
  showToast('Signed out');
}

function initMap() {
  const worldBounds = L.latLngBounds([[-85, -180], [85, 180]]);
  map = L.map('map', {
    zoomControl: true,
    preferCanvas: true,
    minZoom: 3,                    // can't zoom out far enough to see repeats
    maxBounds: worldBounds,        // can't pan into the gray void / copies
    maxBoundsViscosity: 1.0,
    worldCopyJump: false,
  }).setView([36.5, 138.0], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO',
    maxZoom: 19,
    noWrap: true,                  // render the world only once
    bounds: worldBounds,
  }).addTo(map);
}

async function fetchFXRates() {
  try {
    const r = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
    if (!r.ok) throw new Error();
    const d = await r.json();
    FX.EUR = d.rates.EUR; FX.USD = d.rates.USD;
    FX.GBP = d.rates.GBP; FX.AUD = d.rates.AUD;
    document.getElementById('yen-rate-note').textContent =
      `Live rates · 1¥ = €${FX.EUR.toFixed(4)} · $${FX.USD.toFixed(4)}`;
  } catch { /* use fallback */ }
}

async function loadListings() {
  setLoading(true);
  // Try the live Flask API first (local dev); fall back to the static snapshot
  // (Cloudflare Pages); finally fall back to bundled demo data.
  for (const src of ['/api/listings', './listings.json']) {
    try {
      const r = await fetch(src);
      if (!r.ok) continue;
      const d = await r.json();
      ALL = d.listings || [];
      filter();
      setLoading(false);
      return;
    } catch { /* try next source */ }
  }
  ALL = DEMO_DATA;
  filter();
  showToast('⚠ No data source — showing demo data');
  setLoading(false);
}

async function refreshData() {
  setLoading(true);
  try {
    await fetch('/api/refresh', { method: 'POST' });
    showToast('🔄 Scraping started… reloading in 5s');
    setTimeout(loadListings, 5000);
  } catch { showToast('⚠ Could not reach server'); setLoading(false); }
}

// ── AIRBNB SCORE CALCULATOR ──────────────────────────────────────────────────
const AIRBNB_TOURISM = {
  '沖縄':90,'京都':88,'大阪':82,'北海道':80,'東京':78,'広島':75,'長野':72,
  '山梨':70,'静岡':68,'福岡':67,'奈良':65,'鹿児島':63,'愛媛':62,'高知':60,
  '新潟':58,'岩手':55,'秋田':54,'島根':52,'鳥取':50,'宮崎':58,
};

function calcAirbnb(l) {
  let score = 50;
  const text = ((l.title||'')+(l.description||'')+(l.tags||[]).join(' ')).toLowerCase();

  const tourism = AIRBNB_TOURISM[l.prefecture] || 45;
  score = score * 0.3 + tourism * 0.7;

  if (/海|ocean|beach|sea|coast|coastal/.test(text)) score += 12;
  if (/富士|fuji|mountain|ski|スキー|onsen|温泉/.test(text)) score += 10;
  if (/古民家|kominka|traditional|町家|machiya/.test(text)) score += 8;
  if (/リノベ|renovated|renovatio|良好/.test(text)) score += 9;
  if (/seaview|oceanview|ocean view|景色|view/.test(text)) score += 7;
  if (/大規模修繕|major repair|大規模|collapsed/.test(text)) score -= 18;
  if (/要リフォーム|needs renovation/.test(text)) score -= 5;

  if (l.size_m2 >= 100) score += 8;
  if (l.size_m2 >= 150) score += 5;
  if (l.rooms) { const rm = parseInt(l.rooms); if (rm >= 4) score += 6; if (rm >= 6) score += 4; }

  if (l.price_jpy !== null && l.price_jpy !== undefined) {
    if (l.price_jpy === 0) score += 15;
    else if (l.price_jpy < 1000000) score += 12;
    else if (l.price_jpy < 3000000) score += 7;
    else if (l.price_jpy < 8000000) score += 2;
    else score -= 3;
  }

  if (l.built_year && l.built_year < 1960) score -= 5;
  if (l.built_year && l.built_year > 1990) score += 4;

  return Math.min(99, Math.max(5, Math.round(score)));
}

function airbnbColor(s) {
  if (s >= 75) return 'var(--green)';
  if (s >= 55) return 'var(--accent)';
  if (s >= 35) return 'var(--blue)';
  return 'var(--text3)';
}

function airbnbVerdict(s, l) {
  const text = ((l.title||'')+(l.description||'')+(l.tags||[]).join(' ')).toLowerCase();
  const tourism = AIRBNB_TOURISM[l.prefecture] || 45;
  let pros = [], cons = [];

  if (tourism >= 75) pros.push('High tourist demand in this region');
  else if (tourism >= 55) pros.push('Moderate tourist traffic');
  else cons.push('Lower tourist volume in this area');

  if (/海|ocean|beach|sea/.test(text)) pros.push('Coastal/ocean proximity');
  if (/温泉|onsen/.test(text)) pros.push('Hot spring access nearby');
  if (/スキー|ski/.test(text)) pros.push('Ski resort access');
  if (/富士|fuji/.test(text)) pros.push('Mt. Fuji views attract visitors');
  if (/古民家|kominka/.test(text)) pros.push('Traditional architecture — unique stay');
  if (/リノベ|renovated/.test(text)) pros.push('Already renovated — lower setup cost');
  if (l.size_m2 >= 100) pros.push(`Large floor area (${l.size_m2}m²) fits groups`);

  if (/大規模修繕/.test(text)) cons.push('Major renovation needed before listing');
  if (/要リフォーム/.test(text)) cons.push('Renovation required — adds upfront cost');
  if (l.built_year && l.built_year < 1960) cons.push(`Very old structure (${l.built_year}) — compliance risk`);
  if (tourism < 50) cons.push('Region has limited Airbnb demand data');
  if (!l.size_m2 || l.size_m2 < 60) cons.push('Small floor area limits group bookings');

  const baseRate = { EUR: 45 };
  const tourismMult = tourism / 60;
  const sizeMult = l.size_m2 ? Math.min(2, l.size_m2 / 80) : 1;
  const nightlyEUR = Math.round(baseRate.EUR * tourismMult * sizeMult);
  const monthlyEUR = Math.round(nightlyEUR * 15);
  const priceEUR = l.price_jpy ? Math.round(l.price_jpy * FX.EUR) : null;
  const roiYears = priceEUR ? Math.round(priceEUR / (monthlyEUR * 12)) : null;

  return { pros: pros.slice(0,4), cons: cons.slice(0,4), nightlyEUR, monthlyEUR, roiYears };
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  const pref = document.getElementById('pref-select').value;
  const sort = document.getElementById('sort-select').value;
  const maxPrice = parseInt(document.getElementById('price-range').value);

  FILTERED = ALL.filter(l => {
    if (favView && !FAVS.has(l.id)) return false;
    if (pref && !((l.prefecture||'')+(l.city||'')).includes(pref)) return false;
    if (maxPrice < 50000000 && l.price_jpy != null && l.price_jpy > maxPrice) return false;
    if (activeTags.has('free') && l.price_jpy !== 0) return false;
    if (activeTags.has('airbnb') && calcAirbnb(l) < 70) return false;
    const txt = ((l.title||'')+(l.description||'')+(l.tags||[]).join(' ')).toLowerCase();
    if (activeTags.has('kominka') && !/(古民家|kominka|町家)/.test(txt)) return false;
    if (activeTags.has('renovated') && !/(リノベ|renovated|良好|済み)/.test(txt)) return false;
    if (activeTags.has('sea') && !/(海|ocean|beach|sea|coast)/.test(txt)) return false;
    if (activeTags.has('farm') && !/(農地|farm|farmland|農業)/.test(txt)) return false;
    if (q) { if (!txt.includes(q) && !((l.prefecture||'')+(l.city||'')).toLowerCase().includes(q)) return false; }
    return true;
  });

  if (sort === 'price_asc') FILTERED.sort((a,b) => (a.price_jpy??Infinity)-(b.price_jpy??Infinity));
  else if (sort === 'price_desc') FILTERED.sort((a,b) => (b.price_jpy??-1)-(a.price_jpy??-1));
  else if (sort === 'airbnb_desc') FILTERED.sort((a,b) => calcAirbnb(b)-calcAirbnb(a));
  else if (sort === 'size_desc') FILTERED.sort((a,b) => (b.size_m2??0)-(a.size_m2??0));
  else if (sort === 'year_asc') FILTERED.sort((a,b) => (a.built_year??9999)-(b.built_year??9999));
  else if (sort === 'year_desc') FILTERED.sort((a,b) => (b.built_year??0)-(a.built_year??0));

  document.getElementById('result-count').textContent = FILTERED.length + ' listings';
  document.getElementById('sidebar-count').textContent = FILTERED.length + ' properties';
  renderList();
  renderMarkers();
}

function toggleTag(el, tag) {
  el.classList.toggle('on');
  activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
  filter();
}

function updatePriceLabel() {
  const v = parseInt(document.getElementById('price-range').value);
  const el = document.getElementById('price-label');
  if (v >= 50000000) { el.textContent = 'All'; return; }
  if (v === 0) { el.textContent = 'FREE'; return; }
  const man = v / 10000;
  el.textContent = man >= 10000 ? (man/10000).toFixed(0)+'億' : man.toFixed(0)+'万';
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById('listings-list');
  if (!FILTERED.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-jp">空</div><div>No properties found</div></div>';
    return;
  }
  container.innerHTML = FILTERED.map(l => cardHTML(l)).join('');
}

function fmtYen(jpy) {
  if (jpy >= 100_000_000) return `¥${(jpy / 100_000_000).toLocaleString('de-DE', {maximumFractionDigits:1})} Mrd.`;
  if (jpy >= 10_000_000)  return `¥${(jpy / 1_000_000).toLocaleString('de-DE', {maximumFractionDigits:1})} Mio.`;
  if (jpy >= 1_000_000)   return `¥${(jpy / 1_000_000).toLocaleString('de-DE', {maximumFractionDigits:2})} Mio.`;
  return `¥${jpy.toLocaleString('de-DE')}`;
}

function fmtJPY(jpy) {
  if (jpy === 0) return '<span class="lcard-price-free">FREE / 無償</span>';
  if (jpy == null) return '<span style="font-family:var(--mono);font-size:11px;color:var(--text3)">Price on request</span>';
  const eur = Math.round(jpy * FX.EUR);
  return `<span class="lcard-price-jpy">${fmtYen(jpy)}</span><span class="lcard-price-eur">≈ €${eur.toLocaleString('de-DE')}</span>`;
}

function cardHTML(l) {
  const ab = calcAirbnb(l);

  const badgeAB = ab >= 75 ? '<span class="badge badge-airbnb-hot">AIRBNB ★</span>' : ab >= 60 ? '<span class="badge badge-airbnb-ok">AIRBNB</span>' : '';

  const img = l.image_url
    ? `<img src="${l.image_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholder = `<div class="lcard-img-placeholder" ${l.image_url ? 'style="display:none"' : ''}>家</div>`;

  const seis = seismicInfo(l.built_year);
  const specs = [
    l.size_m2 ? `<span class="spec-pill"><span class="si">⬜</span>${l.size_m2}m²</span>` : '',
    l.land_m2 ? `<span class="spec-pill"><span class="si">🌿</span>${l.land_m2}m² land</span>` : '',
    l.rooms   ? `<span class="spec-pill"><span class="si">🚪</span>${l.rooms}</span>` : '',
    l.built_year ? `<span class="spec-pill"><span class="si">📅</span>${l.built_year}</span>` : '',
    l.built_year ? `<span class="spec-pill" style="border-color:${seis.color};color:${seis.color}"><span class="si">🛡</span>${seis.risk} seismic</span>` : '',
    l.condition ? `<span class="spec-pill">${conditionEN(l.condition)}</span>` : '',
  ].filter(Boolean).join('');

  const tags = (l.tags||[]).slice(0,3).map(t=>`<span class="ltag">${t}</span>`).join('');
  const prefEN = prefToEN(l.prefecture);

  return `
  <div class="lcard ${selectedId===l.id?'selected':''}" onclick="openDetail('${l.id}')">
    <div class="lcard-img-wrap">
      ${img}${placeholder}
      <div class="lcard-badges">${badgeFree}${badgeCheap}${badgeAB}</div>
      <span class="badge-source">${l.source||''}</span>
      <button class="fav-btn ${isFav(l.id)?'on':''}" onclick="event.stopPropagation();toggleFav('${l.id}',this)" title="Save to favorites">${isFav(l.id)?'♥':'♡'}</button>
    </div>
    <div class="lcard-body">
      <div class="lcard-location">${prefEN}${l.city ? ' · '+l.city : ''}</div>
      <div class="lcard-title">${l.title_en || l.title}</div>
      ${l.title_en ? `<div style="font-size:10px;color:var(--text3);font-family:var(--jp);margin-bottom:4px">${l.title}</div>` : ''}
      <div class="lcard-price-row">${fmtJPY(l.price_jpy)}</div>
      ${specs ? `<div class="lcard-specs">${specs}</div>` : ''}
      <div class="airbnb-bar">
        <span class="airbnb-label">AIRBNB</span>
        <div class="airbnb-track"><div class="airbnb-fill" style="width:${ab}%;background:${abColor}"></div></div>
        <span class="airbnb-score-val" style="color:${abColor}">${ab}/99</span>
      </div>
    </div>
    <div class="lcard-footer">
      <div class="lcard-tags">${tags}</div>
      <a class="lcard-link" href="${l.source_url}" target="_blank" onclick="event.stopPropagation()">Source →</a>
    </div>
  </div>`;
}

// ── SEISMIC STANDARD & RISK (derived from build year + condition) ─────────────
function seismicInfo(year) {
  if (!year) return { era: 'Unknown', label: 'Build year unknown', color: 'var(--text3)', risk: 'Unknown', note: 'No construction year on record — verify the seismic standard before buying.' };
  if (year < 1981) return {
    era: '旧耐震 (Pre-1981)', label: 'Old seismic standard', color: 'var(--red)', risk: 'High',
    note: 'Built before the 1981 earthquake code. May need seismic retrofitting (耐震補強); can be harder to insure/finance.'
  };
  if (year < 2000) return {
    era: '新耐震 (1981–2000)', label: 'New seismic standard (1981)', color: 'var(--accent)', risk: 'Moderate',
    note: 'Meets the 1981 earthquake code. Generally sound, but pre-2000 wood joints are weaker than the latest standard.'
  };
  return {
    era: '2000年基準 (2000+)', label: 'Current seismic standard', color: 'var(--green)', risk: 'Low',
    note: 'Built to the strengthened post-2000 code — the strongest standard for wooden houses.'
  };
}

function riskLevel(l) {
  // Combine seismic era, age and stated condition into one verdict.
  const yr = l.built_year;
  const s = seismicInfo(yr);
  let score = { 'Low': 1, 'Moderate': 2, 'High': 3, 'Unknown': 2 }[s.risk];
  const cond = (l.condition || '') + (l.description || '');
  if (/大規模修繕|要大規模/.test(cond)) score += 1;
  if (yr && (new Date().getFullYear() - yr) > 50) score += 1;
  if (score >= 4) return { label: 'High Risk', color: 'var(--red)' };
  if (score >= 3) return { label: 'Elevated', color: 'var(--accent)' };
  if (score === 2) return { label: 'Moderate', color: 'var(--blue)' };
  return { label: 'Low Risk', color: 'var(--green)' };
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────

  const ab = calcAirbnb(l);

    const gbp = Math.round(yen * FX.GBP);
    const reno_low = Math.round(3000000 * FX.EUR);
    const reno_high = Math.round(8000000 * FX.EUR);
    calcSection = `

        <div class="yen-calc-title">¥ PRICE CONVERTER</div>

          <div class="yen-calc-result-row"><span class="yen-calc-result-label">USD $</span><span class="yen-calc-result-val">$${usd.toLocaleString()}</span></div>

            </div>

      <div style="margin-top:16px;display:flex;gap:8px">
        <a href="${l.source_url}" target="_blank" style="flex:1;display:block;padding:10px;background:var(--accent);color:#000;font-weight:700;font-size:12px;text-align:center;border-radius:var(--r);text-decoration:none;letter-spacing:.04em">→ VIEW SOURCE</a>
        <a href="https://www.airbnb.com/s/${encodeURIComponent((prefToEN(l.prefecture)||'Japan')+' Japan')}/homes" target="_blank" style="flex:1;display:block;padding:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;text-align:center;border-radius:var(--r);text-decoration:none">🏠 Airbnb Comps</a>
      </div>
    </div>`;

  document.getElementById('detail-panel').classList.add('open');

  if (l.lat && l.lng && map) {
    map.setView([l.lat, l.lng], 12);
    const mk = markers.find(m => m._akiyaId === l.id);
    if (mk) mk.openPopup();
  }
}

function updateInlineCalc(id) {
  const inp = document.getElementById(`calc-input-${id}`);
  const res = document.getElementById(`calc-result-${id}`);
  if (!inp || !res) return;
  const yen = parseFloat(inp.value) || 0;
  const eur = Math.round(yen * FX.EUR);
  const usd = Math.round(yen * FX.USD);
  const gbp = Math.round(yen * FX.GBP);
  res.innerHTML = `
    <div class="yen-calc-result-row"><span class="yen-calc-result-label">EUR €</span><span class="yen-calc-result-val">€${eur.toLocaleString('de-DE')}</span></div>
    <div class="yen-calc-result-row"><span class="yen-calc-result-label">USD $</span><span class="yen-calc-result-val">$${usd.toLocaleString()}</span></div>
    <div class="yen-calc-result-row"><span class="yen-calc-result-label">GBP £</span><span class="yen-calc-result-val">£${gbp.toLocaleString()}</span></div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedId = null;
}

// ── MAP MARKERS ───────────────────────────────────────────────────────────────
function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  FILTERED.forEach(l => {
    if (!l.lat || !l.lng) return;
    const ab = calcAirbnb(l);
    const color = l.price_jpy === 0 ? '#3ecf8e' : ab >= 75 ? '#f05050' : ab >= 60 ? '#a060f0' : '#e8a020';
    const size = l.price_jpy === 0 ? 16 : ab >= 70 ? 14 : 10;
    const icon = L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid rgba(0,0,0,.5);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>`,
      className: '', iconSize: [size, size], iconAnchor: [size/2, size/2]
    });
    const mk = L.marker([l.lat, l.lng], { icon }).addTo(map);
    mk._akiyaId = l.id;
    const man = l.price_jpy === 0 ? 'FREE' : l.price_jpy ? fmtYen(l.price_jpy) : '要問合せ';
    const prefEN = prefToEN(l.prefecture);
    mk.bindPopup(`
      <div class="map-popup">
        <div class="map-popup-loc">${prefEN}${l.city?' · '+l.city:''}</div>
        <div class="map-popup-title">${l.title}</div>
        <div class="map-popup-price">${man}${l.price_jpy ? ' ≈ €'+Math.round(l.price_jpy*FX.EUR).toLocaleString('de-DE') : ''}</div>
        <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px">Airbnb: ${ab}/99 · ${l.source||''}</div>
        <div class="map-popup-btn" onclick="openDetail('${l.id}')">View Details →</div>
      </div>`, { maxWidth: 220 });
    mk.on('click', () => {
      openDetail(l.id);
      document.getElementById('listings-list').querySelector(`[onclick*="${l.id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    markers.push(mk);
  });
}

// ── VIEW MODES ────────────────────────────────────────────────────────────────
// Sections: 'search' (card grid), 'map' (full map), 'saved' (favorites grid)
function setSection(s) {
  activeView = s;
  const sidebar = document.getElementById('sidebar');
  const mapArea = document.getElementById('map-area');

  ['search','map','saved'].forEach(id => document.getElementById('nav-'+id)?.classList.remove('active'));
  document.getElementById('nav-'+s)?.classList.add('active');

  // 'saved' is the grid filtered to favorites
  favView = (s === 'saved');

  if (s === 'map') {
    sidebar.style.display = 'none';
    mapArea.style.display = '';
  } else {
    // search + saved: full-width card grid, map hidden
    sidebar.style.display = '';
    sidebar.classList.add('grid-mode');
    mapArea.style.display = 'none';
  }

  closeMobileNav();
  filter();
  setTimeout(() => map?.invalidateSize(), 80);
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────────────
let _lbImgs = [], _lbIdx = 0, _detailImgs = [];

// Open the lightbox for the currently-open detail panel's images at a given index
function openDetailLightbox(idx) {
  if (_detailImgs && _detailImgs.length) openLightbox(_detailImgs, idx);
}

// Rewrite SUUMO/homes resizeImage URLs to request a large version
function bigImg(url) {
  if (!url) return url;
  if (url.includes('resizeImage') || url.includes('w=') ) {
    return url.replace(/([?&])w=\d+/i, '$1w=1200').replace(/([?&])h=\d+/i, '$1h=900');
  }
  return url;
}

function openLightbox(imgs, idx) {
  _lbImgs = imgs; _lbIdx = idx;
  _lbRender();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', _lbKey);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', _lbKey);
}

function lbClickBg(e) { if (e.target === document.getElementById('lightbox')) closeLightbox(); }

function lbNav(dir) {
  _lbIdx = (_lbIdx + dir + _lbImgs.length) % _lbImgs.length;
  _lbRender();
}

function _lbKey(e) {
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'Escape')     closeLightbox();
}

function _lbRender() {
  document.getElementById('lb-img').src = bigImg(_lbImgs[_lbIdx]);
  document.getElementById('lb-counter').textContent = `${_lbIdx + 1} / ${_lbImgs.length}`;
  const thumbs = document.getElementById('lb-thumbs');
  thumbs.innerHTML = _lbImgs.map((url, i) =>
    `<img class="lightbox-thumb ${i===_lbIdx?'active':''}" src="${url}" onclick="event.stopPropagation();_lbIdx=${i};_lbRender()">`
  ).join('');
  // scroll active thumb into view
  const active = thumbs.querySelector('.active');
  if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}
