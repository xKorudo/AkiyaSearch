const COND_EN={'要リフォーム':'Needs renovation','要修繕':'Needs repair','要大規模修繕':'Major repairs needed','リノベーション済み':'Renovated','良好':'Good condition','普通':'Fair condition','要確認':'Condition unknown','古民家':'Traditional kominka'};
const AIRBNB_TOURISM={'沖縄':90,'京都':88,'大阪':82,'北海道':80,'東京':78,'広島':75,'長野':72,'山梨':70,'静岡':68,'福岡':67,'奈良':65,'鹿児島':63,'愛媛':62,'高知':60,'新潟':58,'岩手':55,'秋田':54,'島根':52,'鳥取':50,'宮崎':58};

const conditionEN=c=>COND_EN[c]||c||'';
function fmtYen(j){if(j>=1e8)return'¥'+(j/1e8).toLocaleString('de-DE',{maximumFractionDigits:1})+' Mrd.';if(j>=1e7)return'¥'+(j/1e6).toLocaleString('de-DE',{maximumFractionDigits:1})+' Mio.';if(j>=1e6)return'¥'+(j/1e6).toLocaleString('de-DE',{maximumFractionDigits:2})+' Mio.';return'¥'+j.toLocaleString('de-DE');}
function convPrice(j){if(j==null)return'';if(userCurrency==='JPY')return'¥'+Math.round(j).toLocaleString('de-DE');return CUR_SYMBOL[userCurrency]+Math.round(j*FX[userCurrency]).toLocaleString('de-DE');}
function gmapsUrl(l){const city=(l.city||'').trim(),pref=(l.prefecture||'').trim();if(city){let pf=pref;if(pref==='東京')pf='東京都';else if(pref==='大阪'||pref==='京都')pf=pref+'府';else if(pref!=='北海道'&&pref)pf=pref+'県';return'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(pf+city+' 日本');}if(l.lat&&l.lng)return'https://www.google.com/maps/search/?api=1&query='+l.lat+','+l.lng;const hasJp=l.title&&/[　-鿿]/.test(l.title);const addr=hasJp?l.title:pref;return'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(addr+' 日本');}
function bigImg(u){return u&&(u.includes('resizeImage')||u.includes('w='))?u.replace(/([?&])w=\d+/i,'$1w=1200').replace(/([?&])h=\d+/i,'$1h=900'):u;}
function disclaimerHTML(){return `<div class="disclaimer" style="margin-top:18px;padding:11px 13px;background:rgba(232,160,32,.06);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:6px;font-size:11px;line-height:1.6;color:var(--text2)">⚠ <strong style="color:var(--text)">Disclaimer:</strong> Listings are aggregated automatically from third-party sources (SUUMO, LIFULL Akiya Bank and others). Details such as the address, location, price, size, build year, photos and availability may be inaccurate, incomplete, outdated or already sold, and translations are machine-generated. Airbnb income, seismic and currency figures are rough estimates, not advice. Always verify everything with the original source and a licensed professional before making any decision. We accept no liability for errors or decisions made based on this information.</div>`;}
function proGateHTML(desc){return`<div style="padding:20px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;text-align:center"><div style="font-size:26px;margin-bottom:8px">🔒</div><div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px">${desc}</div><a href="./subscription.html" style="display:inline-block;padding:9px 20px;background:var(--accent);color:#000;font-weight:700;font-size:13px;border-radius:6px;text-decoration:none">Get Pro access →</a></div>`;}
function calcAirbnb(l){let s=50;const t=((l.title||'')+(l.description||'')).toLowerCase();const to=AIRBNB_TOURISM[l.prefecture]||45;s=s*.3+to*.7;if(/海|ocean|beach|sea|coast/.test(t))s+=12;if(/富士|fuji|ski|スキー|温泉|onsen/.test(t))s+=10;if(/古民家|kominka|町家/.test(t))s+=8;if(/リノベ|renovated|良好/.test(t))s+=9;if(/大規模修繕/.test(t))s-=18;if(l.size_m2>=100)s+=8;if(l.size_m2>=150)s+=5;if(l.price_jpy===0)s+=15;else if(l.price_jpy<1e6)s+=12;else if(l.price_jpy<3e6)s+=7;else if(l.price_jpy>=8e6)s-=3;if(l.built_year&&l.built_year<1960)s-=5;if(l.built_year&&l.built_year>1990)s+=4;return Math.min(99,Math.max(5,Math.round(s)));}
function airbnbColor(s){return s>=75?'var(--green)':s>=55?'var(--accent)':s>=35?'var(--blue)':'var(--text3)';}
function seismicInfo(y){if(!y)return{era:'Unknown',label:'Build year unknown',color:'var(--text3)',risk:'Unknown',note:'No construction year on record — verify the seismic standard before buying.'};if(y<1981)return{era:'旧耐震 (Pre-1981)',label:'Old seismic standard',color:'var(--red)',risk:'High',note:'Built before the 1981 earthquake code. May need seismic retrofitting; can be harder to insure/finance.'};if(y<2000)return{era:'新耐震 (1981–2000)',label:'New seismic standard (1981)',color:'var(--accent)',risk:'Moderate',note:'Meets the 1981 earthquake code. Generally sound, but pre-2000 wood joints are weaker than the latest standard.'};return{era:'2000年基準 (2000+)',label:'Current seismic standard',color:'var(--green)',risk:'Low',note:'Built to the strengthened post-2000 code — the strongest standard for wooden houses.'};}
function riskLevel(l){const s=seismicInfo(l.built_year);let sc={'Low':1,'Moderate':2,'High':3,'Unknown':2}[s.risk];const c=(l.condition||'')+(l.description||'');if(/大規模修繕|要大規模/.test(c))sc+=1;if(l.built_year&&(new Date().getFullYear()-l.built_year)>50)sc+=1;if(sc>=4)return{label:'High Risk',color:'var(--red)'};if(sc>=3)return{label:'Elevated',color:'var(--accent)'};if(sc===2)return{label:'Moderate',color:'var(--blue)'};return{label:'Low Risk',color:'var(--green)'};}
function airbnbVerdict(l){const t=((l.title||'')+(l.description||'')).toLowerCase();const to=AIRBNB_TOURISM[l.prefecture]||45;let pros=[],cons=[];if(to>=75)pros.push('High tourist demand in this region');else if(to>=55)pros.push('Moderate tourist traffic');else cons.push('Lower tourist volume in this area');if(/海|ocean|beach|sea/.test(t))pros.push('Coastal/ocean proximity');if(/温泉|onsen/.test(t))pros.push('Hot spring access nearby');if(/古民家|kominka/.test(t))pros.push('Traditional architecture — unique stay');if(/リノベ|renovated/.test(t))pros.push('Already renovated — lower setup cost');if(l.size_m2>=100)pros.push('Large floor area ('+l.size_m2+'m²) fits groups');if(/大規模修繕/.test(t))cons.push('Major renovation needed before listing');if(l.built_year&&l.built_year<1960)cons.push('Very old structure ('+l.built_year+') — compliance risk');if(!l.size_m2||l.size_m2<60)cons.push('Small floor area limits group bookings');const nightly=Math.round(45*(to/60)*(l.size_m2?Math.min(2,l.size_m2/80):1));const SPECIAL=['大阪','東京','新潟','千葉','福岡'];const special=SPECIAL.includes(l.prefecture);const annualNights=Math.min(180,Math.round(120*(to/60)));const monthly=Math.round(nightly*annualNights/12);const annualEUR=nightly*annualNights;const priceEUR=l.price_jpy?Math.round(l.price_jpy*FX.EUR):null;const roi=priceEUR&&annualEUR?Math.round(priceEUR/annualEUR):null;if(annualNights>=180)cons.push('Income limited by the 180-night/yr minpaku cap');const minpaku=special?'In a special minpaku zone (特区民泊): with a licence you can operate beyond the 180-night/yr cap.':'Standard minpaku is capped at 180 nights/yr — exceeding it needs a hotel/ryokan licence (旅館業法). Always verify the local ordinance & register (届出).';return{pros:pros.slice(0,4),cons:cons.slice(0,4),nightly,monthly,annualNights,special,minpaku,roi};}

// ── auth + favorites + watchlists (shares the same Supabase session) ──
let supa=null,currentUser=null,FAVS=new Set(),WATCHLISTS=[],CURRENT=null,userTier='free';
async function loadUserTier(){
  if(!supa||!currentUser){userTier='free';return;}
  try{const{data}=await supa.from('user_profiles').select('tier').eq('user_id',currentUser.id).maybeSingle();userTier=data?.tier||'free';}catch{userTier='free';}
}
async function initSupa(){
  if(!(SUPABASE_URL&&SUPABASE_ANON_KEY&&window.supabase))return;
  supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  const {data}=await supa.auth.getSession();
  if(data&&data.session){currentUser=data.session.user;await loadFavsAndWatchlists();await loadUserTier();}
  renderActions(CURRENT);
  renderAirbnbSection(CURRENT);
  if(userTier==='pro'&&CURRENT){renderHazards(CURRENT);const aside=document.getElementById('hazard-aside');if(aside)aside.insertAdjacentHTML('beforeend',prefBoxHTML(CURRENT));}
  if(CURRENT&&CURRENT.id){try{supa.rpc('bump_listing_view',{lid:CURRENT.id});}catch{}}
}
async function loadFavsAndWatchlists(){
  if(!supa||!currentUser)return;
  try{const {data}=await supa.from('favorites').select('listing_id').eq('user_id',currentUser.id);(data||[]).forEach(r=>FAVS.add(r.listing_id));}catch{}
  try{
    const {data:wls}=await supa.from('watchlists').select('*').order('created_at');
    const ids=(wls||[]).map(w=>w.id);let items=[];
    if(ids.length){const it=await supa.from('watchlist_items').select('*').in('watchlist_id',ids);items=it.data||[];}
    WATCHLISTS=(wls||[]).map(w=>({...w,items:items.filter(i=>i.watchlist_id===w.id).map(i=>i.listing_id)}));
  }catch{}
}
function isFav(id){return FAVS.has(id);}
async function toggleFav(id){
  // Account-only: nothing stored on the device. Not logged in -> go sign in on the app.
  if(!currentUser){location.href='./?l='+encodeURIComponent(id);return;}
  const adding=!FAVS.has(id);adding?FAVS.add(id):FAVS.delete(id);renderActions(CURRENT);
  if(adding)await supa.from('favorites').upsert({user_id:currentUser.id,listing_id:id},{onConflict:'user_id,listing_id',ignoreDuplicates:true});
  else await supa.from('favorites').delete().eq('user_id',currentUser.id).eq('listing_id',id);
}
function openWatchMenu(id,anchor){
  if(!currentUser){location.href='./?l='+encodeURIComponent(id);return;}
  document.querySelector('.atw-menu')?.remove();
  const menu=document.createElement('div');menu.className='atw-menu';
  menu.innerHTML=(WATCHLISTS.map(w=>`<div class="atw-item" onclick="atwToggle('${w.id}','${id}',this)">${w.items.includes(id)?'☑':'☐'} ${w.name}</div>`).join('')||'<div style="padding:8px;color:var(--text3);font-size:12px">No watchlists yet</div>')
    +`<div class="atw-item atw-new" onclick="atwCreate('${id}')">＋ New watchlist…</div>`;
  document.body.appendChild(menu);const r=anchor.getBoundingClientRect();
  menu.style.top=(r.bottom+window.scrollY+6)+'px';menu.style.left=Math.min(r.left,window.innerWidth-244)+'px';
  setTimeout(()=>document.addEventListener('click',_wmClose),0);
}
function _wmClose(e){if(!e.target.closest('.atw-menu')){document.querySelector('.atw-menu')?.remove();document.removeEventListener('click',_wmClose);}}
async function atwToggle(wlId,id,el){
  const w=WATCHLISTS.find(x=>x.id===wlId);const inIt=w.items.includes(id);
  if(inIt){await supa.from('watchlist_items').delete().eq('watchlist_id',wlId).eq('listing_id',id);w.items=w.items.filter(x=>x!==id);}
  else{await supa.from('watchlist_items').upsert({watchlist_id:wlId,listing_id:id,added_by:currentUser.id});w.items.push(id);}
  el.textContent=(inIt?'☐':'☑')+' '+w.name;
}
async function atwCreate(id){
  const name=prompt('New watchlist name:');if(!name)return;
  const {data}=await supa.from('watchlists').insert({owner_id:currentUser.id,name}).select().single();
  if(data){await supa.from('watchlist_members').insert({watchlist_id:data.id,user_id:currentUser.id,role:'owner'});await supa.from('watchlist_items').upsert({watchlist_id:data.id,listing_id:id,added_by:currentUser.id});await loadFavsAndWatchlists();}
  document.querySelector('.atw-menu')?.remove();
}
function shareListig(l){
  const url=location.href;
  const title=(l.title_en||l.title||'Akiya Property')+' — '+(l.price_label||'');
  if(navigator.share){navigator.share({title,url}).catch(()=>{});}
  else{navigator.clipboard.writeText(url).then(()=>{const b=document.getElementById('share-btn');if(b){b.textContent='✓ Copied';setTimeout(()=>{b.textContent='⤴ Share';},1800);}});}
}
function renderActions(l){
  if(!l)return;const el=document.getElementById('actions');if(!el)return;
  el.innerHTML=`<button class="act-btn ${isFav(l.id)?'on':''}" onclick="toggleFav('${l.id}')">${isFav(l.id)?'♥ Saved':'♡ Favorite'}</button>
    <button class="act-btn" onclick="openWatchMenu('${l.id}',this)">👁 Watchlist</button>
    <button class="act-btn" id="share-btn" onclick="shareListig(CURRENT)">⤴ Share</button>`;
}

async function init(){
  initSupa();
  try{const r=await fetch('https://api.exchangerate-api.com/v4/latest/JPY');const d=await r.json();if(d&&d.rates){FX.EUR=d.rates.EUR;FX.USD=d.rates.USD;FX.GBP=d.rates.GBP;FX.AUD=d.rates.AUD;}}catch{}
  const id=new URLSearchParams(location.search).get('id');
  let listings=[];
  try{const r=await fetch('/api/listings');if(r.ok){listings=((await r.json()).listings||[]).filter(x=>x.source!=='AKIYA BANK');}}catch{}
  if(!listings.length){try{const r0=await fetch('listings-0.json');if(r0.ok){const d0=await r0.json();const n=d0.chunks||1;let all=d0.listings||[];if(n>1){const rest=await Promise.all(Array.from({length:n-1},(_,i)=>fetch(`listings-${i+1}.json`).then(r=>r.json()).then(d=>d.listings||[])));rest.forEach(c=>{all=all.concat(c);});}listings=all.filter(x=>x.source!=='AKIYA BANK');}}catch{}}
  listings.forEach(l=>{if(l.price_jpy!=null&&l.price_jpy>0&&l.price_jpy<10000)l.price_jpy=null;});
  const l=listings.find(x=>x.id===id);
  const wrap=document.getElementById('wrap');
  if(!l){wrap.innerHTML='<div style="padding:40px 0;color:var(--text3)">Listing not found. <a href="./search.html">Back to all listings →</a></div>';document.title='Listing not found — Akiya Search';return;}
  // Apply admin moderation override (hidden / field patch)
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/listing_overrides?listing_id=eq.${encodeURIComponent(id)}&select=hidden,patch`,
      {headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY}});
    if(r.ok){const o=(await r.json())[0];
      if(o&&o.hidden){wrap.innerHTML='<div style="padding:40px 0;color:var(--text3)">This listing has been removed by a moderator (e.g. sold or duplicate). <a href="./search.html">Back to all listings →</a></div>';document.title='Listing removed — Akiya Search';return;}
      if(o&&o.patch)Object.assign(l,o.patch);
    }
  }catch{}
  render(l);
}

const REPORT_CATS=[['sold','🏷 Sold / no longer available'],['duplicate','👯 Duplicate listing'],['broken_link','🔗 Broken source link'],['wrong_data','⚠ Wrong data'],['other','✏ Something else']];
let _repCat='';
function openReport(){
  let ov=document.getElementById('rep-ov');
  if(!ov){ov=document.createElement('div');ov.id='rep-ov';
    ov.style.cssText='position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:16px';
    ov.onclick=e=>{if(e.target===ov)ov.style.display='none';};

function pickRep(b){_repCat=b.dataset.c;document.querySelectorAll('.rep-cat').forEach(x=>{x.style.borderColor='var(--border2)';x.style.background='var(--surface2)';x.style.color='var(--text)';});b.style.borderColor='var(--accent)';b.style.background='var(--accent)';b.style.color='#000';}
async function sendRep(){
  if(!_repCat){alert('Please pick a category');return;}
  const row={listing_id:CURRENT?.id,category:_repCat,note:(document.getElementById('rep-note')?.value||'').slice(0,1000)||null};
  if(currentUser)row.reporter=currentUser.id;
  try{await fetch(`${SUPABASE_URL}/rest/v1/reports`,{method:'POST',headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify(row)});}catch{}

  alert('✓ Report sent — thank you!');
}

function render(l){
  CURRENT=l;

    .flatMap(line=>line.split(/(?<=minutes?)[.\s]*\s+(?=[A-Z])/))
    .map(s=>s.trim()).filter(Boolean)
    .map(line=>{
      const busM=line.match(/(\d+)\s*(?:minutes?|mins?)\s*(?:by\s+)?bus/i);

// Small container linking to the prefecture guide
function prefBoxHTML(l){
  const en = prefToEN(l.prefecture) || l.prefecture || 'this prefecture';
  const s = (prefToEN(l.prefecture) || '').toLowerCase().replace(/ /g,'-');

  </div>`;
}

// ── Location natural-hazard panel (separate from building seismic standard) ──
// Legally safe: we show factual USGS earthquake events (attributed) and link to
// the official Japanese hazard maps for tsunami/landslide rather than asserting
// any risk rating ourselves.
function renderHazards(l){
  const aside=document.getElementById('hazard-aside');
  if(!aside) return;
  const hasGeo=l.lat&&l.lng;
  const ll=hasGeo?`${l.lat},${l.lng}`:'';
  const disaster=hasGeo?`https://disaportal.gsi.go.jp/maps/index.html?ll=${ll}&z=15`:'https://disaportal.gsi.go.jp/';
  const jshis=hasGeo?`https://www.j-shis.bosai.go.jp/map/?lat=${l.lat}&lon=${l.lng}&z=13`:'https://www.j-shis.bosai.go.jp/';
  aside.innerHTML=`<div class="hazard-box">
    <div class="hz-title">⚠ Location — natural hazards</div>
    <div class="hz-sub">Depends on <strong>where</strong> the property is — separate from how earthquake-resistant the building is. Data from official sources; we don't rate risk ourselves.</div>

    <div class="hz-item">
      <div class="hz-h">🌐 Recent earthquakes</div>
      <div id="hz-quake"><span class="hz-muted">Loading USGS data…</span></div>
    </div>

    <div class="hz-item">
      <div class="hz-h">🌊 Tsunami history</div>
      <div id="hz-tsunami"><span class="hz-muted">Loading NOAA data…</span></div>
      <a class="hz-link" href="${disaster}" target="_blank" rel="noopener">🗺 Inundation map (MLIT/GSI, 津波 layer) ↗</a>
    </div>

    <div class="hz-item">
      <div class="hz-h">🏔 Landslide</div>
      <div class="hz-muted">No reliable point-level event feed exists for landslides — check the official hazard zones (土砂災害警戒区域):</div>
      <a class="hz-link" href="${disaster}" target="_blank" rel="noopener">🗺 Landslide hazard map (MLIT/GSI) ↗</a>
    </div>

    <div class="hz-item">
      <div class="hz-h">📈 Earthquake probability</div>
      <div class="hz-muted">National seismic hazard model for this area:</div>
      <a class="hz-link" href="${jshis}" target="_blank" rel="noopener">📊 J-SHIS seismic hazard map ↗</a>
    </div>

    <div class="hz-note">Earthquake events: U.S. Geological Survey (USGS). Tsunami events: NOAA NCEI Global Historical Tsunami Database. Hazard & seismic-probability maps: Japan's MLIT/GSI and NIED J-SHIS. Figures may be incomplete or outdated — always verify with these official sources.</div>
  </div>`;
  loadQuakes(l);
  loadTsunami(l);
}

function _haversineKm(lat1,lng1,lat2,lng2){
  const R=6371,toR=d=>d*Math.PI/180;
  const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

async function loadTsunami(l){
  const el=document.getElementById('hz-tsunami');
  if(!el) return;
  if(userTier!=='pro'){el.innerHTML=proGateHTML('Tsunami event history (NOAA NCEI, 200 km radius) — available with a Pro subscription.');return;}
  if(!(l.lat&&l.lng)){ el.innerHTML='<span class="hz-muted">No coordinates — use the inundation map below.</span>'; return; }
  try{
    const r=await fetch('https://www.ngdc.noaa.gov/hazel/hazard-service/api/v1/tsunamis/events?country=JAPAN&minYear=1900');
    if(!r.ok) throw new Error('noaa');
    const d=await r.json();
    const RADIUS=200;
    const near=(d.items||[])
      .filter(e=>typeof e.latitude==='number'&&typeof e.longitude==='number')
      .map(e=>({...e,dist:_haversineKm(l.lat,l.lng,e.latitude,e.longitude)}))
      .filter(e=>e.dist<=RADIUS)
      .sort((a,b)=>(b.year-a.year)||((b.month||0)-(a.month||0))||((b.day||0)-(a.day||0)));
    if(!near.length){ el.innerHTML=`<span class="hz-muted">No recorded tsunami source within ${RADIUS}&nbsp;km since 1900 (NOAA).</span>`; return; }
    const last=near[0];
    const date=`${last.year}${last.month?'-'+String(last.month).padStart(2,'0'):''}${last.day?'-'+String(last.day).padStart(2,'0'):''}`;
    const heights=near.map(e=>e.maxWaterHeight).filter(h=>typeof h==='number');
    const maxH=heights.length?Math.max(...heights):null;
    el.innerHTML=`<div class="hz-stat"><b>${near.length}</b> tsunami source${near.length>1?'s':''} within ${RADIUS}&nbsp;km (since 1900)</div>
      <div class="hz-stat">Most recent: <b>${date}</b>${last.locationName?' · '+last.locationName.toLowerCase().replace(/(^|\s)\S/g,c=>c.toUpperCase()):''}</div>
      ${maxH!=null?`<div class="hz-stat">Max recorded wave: <b>${maxH} m</b></div>`:''}`;
  }catch{
    el.innerHTML='<span class="hz-muted">Couldn\'t load NOAA tsunami data — use the inundation map below.</span>';
  }
}

async function loadQuakes(l){
  const el=document.getElementById('hz-quake');
  if(!el) return;
  if(userTier!=='pro'){el.innerHTML=proGateHTML('Recent earthquake events within 100 km (USGS, last 20 years) — available with a Pro subscription.');return;}
  if(!(l.lat&&l.lng)){ el.innerHTML='<span class="hz-muted">No coordinates for this listing — use the hazard maps below.</span>'; return; }
  const years=20;
  const since=new Date(Date.now()-years*365*24*3600*1000).toISOString().slice(0,10);
  const url=`https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&latitude=${l.lat}&longitude=${l.lng}&maxradiuskm=100&minmagnitude=4.5&starttime=${since}&orderby=time&limit=1000`;
  try{
    const r=await fetch(url);
    if(!r.ok) throw new Error('usgs');
    const d=await r.json();
    const feats=d.features||[];
    if(!feats.length){ el.innerHTML=`<span class="hz-muted">No magnitude ≥ 4.5 quakes within 100&nbsp;km in the last ${years} years (USGS).</span>`; return; }
    const last=feats[0];
    const dt=new Date(last.properties.time).toISOString().slice(0,10);
    const mags=feats.map(f=>f.properties.mag).filter(m=>typeof m==='number');
    const maxMag=Math.max(...mags).toFixed(1);
    el.innerHTML=`<div class="hz-stat"><b>${feats.length}</b> quakes M≥4.5 within 100&nbsp;km (last ${years}&nbsp;yrs)</div>
      <div class="hz-stat">Strongest: <b>M${maxMag}</b></div>
      <div class="hz-stat">Most recent: <b>M${(last.properties.mag||0).toFixed(1)}</b> on ${dt}</div>
      <a class="hz-link" href="${last.properties.url}" target="_blank" rel="noopener">View latest on USGS ↗</a>`;
  }catch{
    el.innerHTML='<span class="hz-muted">Couldn\'t load USGS data right now — try the hazard maps below.</span>';
  }
}
document.addEventListener('keydown',e=>{if(!document.getElementById('lb').classList.contains('open'))return;if(e.key==='Escape')lbClose();if(e.key==='ArrowRight')lbNav(1);if(e.key==='ArrowLeft')lbNav(-1);});
init();
</script>
