<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prefecture — Akiya Search</title>
<meta name="description" content="Learn about a Japanese prefecture — what it's known for, with credible sources, and browse vacant akiya houses there.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
:root{--bg:#0c0c0f;--surface:#141418;--surface2:#1c1c22;--surface3:#242430;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--text:#e8e8e4;--text2:#9a9a90;--text3:#505048;--accent:#e8a020;--accent2:#f0c060;--blue:#5090f0;--mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;--jp:'Noto Serif JP',serif;--r:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}
header{position:sticky;top:0;z-index:100;height:52px;background:rgba(12,12,15,.92);border-bottom:1px solid var(--border2);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 24px;gap:16px;}
.logo{font-size:15px;font-weight:700;color:var(--text);text-decoration:none;}
.logo span{color:var(--accent);}
.logo-jp{font-family:var(--jp);font-weight:300;font-size:12px;color:var(--text3);}
.back{margin-left:auto;font-size:13px;color:var(--text2);}
.back:hover{color:var(--accent);}
.wrap{max-width:1120px;margin:0 auto;padding:36px 28px 56px;}
.crumb{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:18px;}
.crumb a{color:var(--accent);}
.head{display:flex;align-items:center;gap:22px;margin-bottom:8px;}
.outline{width:96px;height:96px;flex-shrink:0;}
.outline svg{width:96px;height:96px;display:block;}
.region-tag{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
h1{font-size:clamp(34px,5vw,56px);font-weight:800;letter-spacing:-.02em;line-height:1.05;}
.h-jp{font-family:var(--jp);font-size:17px;color:var(--text3);margin-top:3px;}
/* two-column article layout so the page fills out */
.cols{display:flex;gap:44px;align-items:flex-start;margin-top:18px;}
.col-main{flex:1;min-width:0;}
.col-side{width:300px;flex-shrink:0;position:sticky;top:72px;}
.long{font-size:17px;color:var(--text);line-height:1.95;margin:0 0 20px;}
.long:last-child{margin-bottom:0;}
.side-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
.sec-title{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.chips{display:flex;flex-direction:column;gap:8px;}
.chip{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text);line-height:1.4;}
.chip b{color:var(--accent);font-weight:700;margin-right:4px;}
.actions{display:flex;flex-direction:column;gap:10px;}
.btn{display:block;text-align:center;padding:12px 16px;border-radius:var(--r);font-weight:700;font-size:14px;text-decoration:none;}
.btn-p{background:var(--accent);color:#000;}
.btn-p:hover{background:var(--accent2);text-decoration:none;}
.btn-s{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-s:hover{background:var(--surface3);color:var(--text);text-decoration:none;}
.sources{font-size:12px;color:var(--text3);line-height:1.6;}
.sources a{color:var(--accent);}
.nav-prefs{display:flex;flex-wrap:wrap;gap:7px;margin-top:36px;border-top:1px solid var(--border);padding-top:20px;}
.nav-prefs a{font-family:var(--mono);font-size:11px;color:var(--text2);border:1px solid var(--border2);border-radius:20px;padding:5px 10px;}
.nav-prefs a:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
@media(max-width:860px){
  .cols{flex-direction:column;gap:24px;}
  .col-side{width:100%;position:static;}
  .long{font-size:16px;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="./index.html">🏚 <span>Akiya</span> Search <span class="logo-jp">空き家</span></a>
  <a class="back" href="./prefectures.html">← All prefectures</a>
</header>

<div class="wrap" id="wrap"><div style="color:var(--text3);padding:40px 0">Loading…</div></div>

<script src="js/prefectures-data.js"></script>
<script>
const slug = new URLSearchParams(location.search).get('p') || '';
const P = PREFECTURES.find(x => prefSlug(x.en) === slug);
const wrap = document.getElementById('wrap');

if (!P) {
  wrap.innerHTML = '<div style="padding:40px 0;color:var(--text3)">Prefecture not found. <a href="./prefectures.html">See all prefectures →</a></div>';
} else {
  document.title = P.en + ' (' + P.kanji + ') — what it\'s known for | Akiya Search';
  const paras = (Array.isArray(P.long) ? P.long : [P.long]).map(p => `<p class="long">${p}</p>`).join('');
  const sib = PREFECTURES.filter(x => x.region === P.region && x.en !== P.en);
  wrap.innerHTML = `
    <div class="crumb"><a href="./prefectures.html">Prefectures</a> · ${P.region}</div>
    <div class="head">
      <div class="outline" id="outline"></div>
      <div>
        <div class="region-tag">${P.region}</div>
        <h1>${P.en}</h1>
        <div class="h-jp">${P.kanji}</div>
      </div>
    </div>
    <div class="cols">
      <div class="col-main">${paras}</div>
      <aside class="col-side">
        <div class="side-card">
          <div class="sec-title">Known for</div>
          <div class="chips">${P.highlights.map(h => `<span class="chip"><b>·</b>${h}</span>`).join('')}</div>
        </div>
        <div class="side-card">
          <div class="actions">
            <a class="btn btn-p" href="./search.html?pref=${encodeURIComponent(P.kanji)}">🔍 Browse akiya in ${P.en} →</a>
            <a class="btn btn-s" href="${prefWiki(P.en)}" target="_blank" rel="noopener">Wikipedia ↗</a>
            <a class="btn btn-s" href="https://www.japan.travel/en/destinations/" target="_blank" rel="noopener">JNTO travel ↗</a>
          </div>
        </div>
        <div class="side-card">
          <div class="sources">Overview is a general summary for orientation. For credible, in-depth information see the linked <strong>Wikipedia</strong> article and the official <a href="https://www.japan.travel/en/destinations/" target="_blank" rel="noopener">Japan National Tourism Organization (JNTO)</a>.</div>
        </div>
      </aside>
    </div>
    <div class="nav-prefs" id="nav-prefs"></div>
  `;

  document.getElementById('nav-prefs').innerHTML =
    `<span style="font-family:var(--mono);font-size:11px;color:var(--text3);align-self:center;margin-right:4px">More in ${P.region}:</span>` +
    sib.map(x => `<a href="./prefecture.html?p=${prefSlug(x.en)}">${x.en}</a>`).join('');

  (async () => {
    try {
      if (typeof d3 === 'undefined' || typeof topojson === 'undefined') return;
      const r = await fetch('./data/japan.topojson'); if (!r.ok) return;
      const topo = await r.json();
      const obj = topo.objects.japan || topo.objects[Object.keys(topo.objects)[0]];
      const fc = topojson.feature(topo, obj);
      const f = fc.features.find(ft => (ft.properties.nam_ja || '').trim().replace(/[県府都]$/, '') === P.kanji);
      if (!f) return;
      const size = 96;
      const proj = d3.geoMercator().fitExtent([[7,7],[size-7,size-7]], f);
      const path = d3.geoPath(proj);
      document.getElementById('outline').innerHTML =
        `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg"><path d="${path(f)}" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
    } catch {}
  })();
}
</script>
</body>
</html>
